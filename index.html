<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiggy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <section class="upper_orange">
        <div class="navBar">
            <div class="logo">
                <img src="images/Logo.png" alt="image is not available" height="48" width="160">
            </div>
            <div class="signbar">
                <div class="corporate font">
                    <p>Swiggy Corporate</p>
                </div>
                <div class="partner font">
                    <p>Partner with us</p>
                </div>
                <div class="getapp font">
                    <p class="text_getapp">Get the app</p>
                    <div class="arro">
                        <i class="fa-solid fa-arrow-down fa-rotate-by" style="color: #ffffff; --fa-rotate-angle: 225deg;"></i>
                    </div>
                </div>
                    <div class="signin font">
                    <p>Sign in</p>
                </div>
            </div>
        </div>
    </section>
    <section class="mid_orange">
        <div class="veges">
            <img src="images/Veggies_new.avif" alt="left" class="left vege">
            <img src="images/Sushi_replace.avif" alt="right" class="right vege">
        </div>
        <div class="mid">
            <div class="comments">
                <p class="comment">Order food & groceries. Discover best restaurants. Swiggy it!</p>
            </div>
            <div class="inputmidbar">
                <div class="locationlogo">
                    <i class="fa-solid fa-location-dot fa-xl" style="color: #ff5200;"></i>
                </div>
                <div class="location_input">
                    <input type="text" class="location" value="" name="location" id="location" autocomplete="off" tabindex="1" placeholder="Enter your delivery location">
                </div>
                <div class="downarrow">
                    <i class="fa-solid fa-angle-down fa-xl" style="color: hsl(0, 0%, 0%);"></i>
                </div>
            </div>
        </div>
    </section>
    <section class="lower_orange">
        <div class="banner">
            <div class="card">
                <img src="images/Food_Delivery.avif" alt="Food Delivery" class="DeliveryFood Poster">
            </div>
            <div class="card">
                <img src="images/Instamart.avif" alt="Instamart" class="Instamart Poster">
            </div>
            <div class="card">
                <img src="images/Dineout.avif" alt="Dineout" class="Dineout Poster">
            </div>
        </div>
    </section>
    <section class="food_option_text food_option">
        <div class="option_text">
            <div class="text_arrow">
                <div class="food_text">
                    <p>Order our best food options</p>
                </div>
                <div class="arrow_scroll">
                    <div class="lefta  arrow">
                        <i class="fa-solid fa-arrow-left" style="color: hsl(0, 0%, 0%);"></i>
                    </div>
                    <div class="righta arrow">
                        <i class="fa-solid fa-arrow-right" style="color: hsl(0, 0%, 0%);"></i>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <section class="food_option_images food_option">
        <div class="food_images">
            <div class="upper_food_images counter_images">
                <img src="images/North Indian.png" alt="North Indian" class="counter_section">
                <img src="images/South Indian.png" alt="South Indian" class="counter_section">
                <img src="images/Biryani.png" alt="Biryani" class="counter_section">
                <img src="images/Burger.png" alt="Burger" class="counter_section">
                <img src="images/Pizza.png" alt="Pizza" class="counter_section">
                <img src="images/Cake.png" alt="Cake" class="counter_section">
                <img src="images/Chinese.png" alt="Chinese" class="counter_section">
                <img src="images/Desserts.png" alt="Desserts" class="counter_section">
                <img src="images/Khichdi.png" alt="Khichdi" class="counter_section">
                <img src="images/Rolls.png" alt="Rolls" class="counter_section">
            </div>
            <div class="lower_food_images counter_images">
                <img src="images/Vada.png" alt="Vada" class="counter_section">
                <img src="images/Dosa.png" alt="Dosa" class="counter_section">
                <img src="images/Shake.png" alt="Shakes" class="counter_section">
                <img src="images/Noodles.png" alt="Noodles" class="counter_section">
                <img src="images/Pav Bhaji.png" alt="Pav Bhaji" class="counter_section">
                <img src="images/Ice Cream.png" alt="Ice Cream" class="counter_section">
                <img src="images/Shawarma.png" alt="Shawarma" class="counter_section">
                <img src="images/Paratha.png" alt="Paratha" class="counter_section">
                <img src="images/Idli.png" alt="Idli" class="counter_section">
                <img src="images/Pasta.png" alt="Pasta" class="counter_section">
            </div>
        </div>
    </section>
</body>
</html>
