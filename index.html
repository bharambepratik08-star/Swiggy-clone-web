<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swiggy</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <div class="upper_orange">
        <div class="navBar">
            <div class="logo">
                <img src="images/Logo.png" alt="image is not available" height="48" width="160">
            </div>
            <div class="signbar">
                <div class="corporate font">
                    <p>Swiggy Corporate</p>
                </div>
                <div class="partner font">
                    <p>Partner with us</p>
                </div>
                <div class="getapp font">
                    <p class="text">Get the app</p>
                    <div class="arro">
                        <i class="fa-solid fa-arrow-down fa-rotate-by" style="color: #ffffff; --fa-rotate-angle: 225deg;"></i>
                    </div>
                </div>
                    <div class="signin font">
                    <p>Sign in</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
